name: Repo Hygiene - Unused Candidates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unused-candidate-evidence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate archival evidence and cooldown policy
        run: |
          python scripts/ops/validate_unused_candidate_evidence.py "${{ github.base_ref || 'main' }}"

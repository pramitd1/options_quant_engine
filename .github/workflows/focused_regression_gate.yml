name: Focused Regression Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  focused-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run focused regression tests
        run: |
          pytest -q \
            tests/test_direction_probability_head.py \
            tests/test_signal_state_direction_head.py \
            tests/test_signal_engine_explainability.py \
            tests/test_consistency_checks.py \
            tests/test_daily_research_report.py \
            tests/test_signal_evaluation_dataset.py \
            tests/test_compact_trade_decision_renderer.py